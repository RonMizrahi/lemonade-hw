# nginx config for the built Vite SPA (spec §11).
#
# The SPA's API client issues same-origin requests to `/onboarding/...` (frontend/src/api/
# client.ts uses a relative base URL), so nginx both serves the static bundle AND reverse-
# proxies the API path to the `api` service on the compose network. This keeps the browser on
# one origin — no CORS round-trips, no build-time API URL baked into the bundle.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reverse-proxy the API. `api` resolves to the api service on the compose network;
    # 3000 is its HTTP port. Swagger (/docs) and metrics (/metrics) go here too so the
    # whole backend surface is reachable from the frontend origin.
    location /onboarding/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /metrics {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # SPA fallback: unknown routes serve index.html so client-side rendering handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
