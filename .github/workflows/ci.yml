# CI (spec §11 bonus). Backend: install → lint → build → unit → integration → e2e.
# Testcontainers brings up real Postgres + Redis inside the runner (Docker is available on
# GitHub-hosted runners), so no service containers are declared here. Frontend: build + test.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:unit
      # Integration + e2e spin up Postgres + Redis via Testcontainers (real infra in the runner).
      - run: npm run test:integration
      - run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test
